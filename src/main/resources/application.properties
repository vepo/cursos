quarkus.mailer.mock=true
%dev.quarkus.mailer.mock=true
%test.quarkus.mailer.mock=true
quarkus.http.limits.max-body-size=12M

#################################
## OpenAPI
#################################
quarkus.smallrye-openapi.path=/openapi.yaml
%test.quarkus.smallrye-openapi.store-schema-directory=target/openapi
%dev.quarkus.swagger-ui.always-include=true
%test.quarkus.swagger-ui.always-include=true
%prod.quarkus.swagger-ui.always-include=false
%prod.quarkus.swagger-ui.enable=false
quarkus.swagger-ui.footer=&#169; 2026 Cursos - https://vepo.dev
quarkus.swagger-ui.path=/openapi
quarkus.swagger-ui.title=Cursos - API

#################################
## Quinoa
#################################
quarkus.quinoa=true
%test.quarkus.quinoa=false
quarkus.quinoa.ui-dir=src/main/webui
quarkus.quinoa.dev-server.port=4203
quarkus.quinoa.dev-server.command=npm run start
# Angular's first dev build can take a while (npm install + compile)
quarkus.quinoa.dev-server.check-timeout=120000

#################################
## Passport REST client
#################################
quarkus.rest-client.passport-api.url=${PASSPORT_API_URL:http://localhost:8080}
