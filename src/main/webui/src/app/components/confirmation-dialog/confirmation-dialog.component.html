<h2 mat-dialog-title data-testid="confirmation-dialog-title">{{ data.title }}</h2>
<mat-dialog-content data-testid="confirmation-dialog-message">
  <p>{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" data-testid="confirmation-dialog-cancel" (click)="cancel()">
    {{ data.cancelLabel || 'Cancelar' }}
  </button>
  <button
    mat-flat-button
    type="button"
    data-testid="confirmation-dialog-confirm"
    [class.btn-danger]="data.destructive"
    [class.btn-primary]="!data.destructive"
    (click)="confirm()">
    {{ data.confirmLabel || 'Confirmar' }}
  </button>
</mat-dialog-actions>
