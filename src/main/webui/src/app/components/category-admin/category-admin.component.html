<main class="catalog app-shell-main" data-testid="shell-main">
  <header class="page-header">
    <h1 class="page-title" data-testid="page-title">Categorias</h1>
    <div class="page-actions" data-testid="page-actions">
      <button mat-flat-button type="button" [disabled]="!categoryName" (click)="create()">Criar categoria</button>
    </div>
  </header>

  <section>
    <mat-form-field appearance="outline">
      <mat-label>Nome</mat-label>
      <input id="category-name" aria-label="Nome da categoria" matInput [(ngModel)]="categoryName" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Slug</mat-label>
      <input id="category-slug" aria-label="Slug da categoria" matInput [(ngModel)]="categorySlug" />
    </mat-form-field>
  </section>

  <section>
    @if (!categories.length) {
      <p class="empty">Nenhuma categoria cadastrada.</p>
    }
    <div class="grid">
      @for (category of categories; track category.id) {
        <article>
          <h2>{{ category.name }}</h2>
          <span class="meta">{{ category.slug }}</span>
        </article>
      }
    </div>
  </section>
</main>
